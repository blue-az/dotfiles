conky.config = {
    alignment = 'top_right',
    background = true,
    double_buffer = true,

    -- Draw to root window (true wallpaper behavior)
    own_window = true,
    own_window_type = 'override',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value = 0,
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',

    font = 'monospace:size=10',
    use_xft = true,

    update_interval = 2,

    gap_x = 50,
    gap_y = 50,

    default_color = 'white',
    color1 = '50fa7b',  -- green
    color2 = '51a2da',  -- fedora blue
    color3 = '3c6eb4',  -- fedora dark blue
};

conky.text = [[
${color2}${font monospace:size=8}

                 .',;::::;,'.
             .';:cccccccccccc:;,.
          .;cccccccccccccccccccccc;.
        .:cccccccccccccccccccccccccc:.
      .;ccccccccccccc;.:cccccccccccccc;.
     .:ccccccccccccc;   .:ccccccccccccc:.
    .cccccccccccccc;      :ccccccccccccc.
    :cccccccccccccc;       :cccccccccccc:
   .cccccccccccccc;        .cccccccccccc.
   .cccccccccccccc          cccccccccccc.
   .cccccccccccccc          cccccccccccc.
   .cccccccccccccc          cccccccccccc.
   .ccccc.,,,,,,,,,,,,,,,,,,,,,,,,.ccccc.
   .ccccc                         ccccc.
   .ccccc                         ccccc.
   .ccccc                         ccccc.
   .ccccc                         ccccc.
   .ccccc                         ccccc.
    :cccc                         cccc:
    .cccc                         cccc.
     .:cc                         cc:.
       .:                         :.

              ${color1}F E D O R A   L I N U X${color2}
${font}${color}

${voffset 50}
${goto 100}${color1}${font monospace:bold:size=12}SYSTEM${font}${color}
${goto 100}${hr 2}
${goto 100}${color1}DISK${color}    ${fs_free /} free
${goto 100}${color1}RAM${color}     ${mem} / ${memmax}
${goto 100}${color1}CPU${color}     ${cpu cpu0}%  ${execi 5 sensors | awk '/^Core 0:/ {gsub(/[^0-9.]/, "", $3); c=$3; printf "%.0f", c * 9/5 + 32}'}°F
${goto 100}${color1}CPU-W${color}   ${execi 5 E1=$(cat /sys/class/powercap/intel-rapl:0/energy_uj); sleep 0.5; E2=$(cat /sys/class/powercap/intel-rapl:0/energy_uj); echo $(( (E2 - E1) / 500000 ))}W
${goto 100}${color1}GPU${color}     ${execi 5 nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader,nounits}%  ${execi 5 C=$(nvidia-smi --query-gpu=temperature.gpu --format=csv,noheader,nounits); echo $(( C * 9 / 5 + 32 ))}°F
${goto 100}${color1}GPU-W${color}   ${execi 5 nvidia-smi --query-gpu=power.draw --format=csv,noheader,nounits | awk '{printf "%.0f", $1}'}W
${goto 100}${color1}IP${color}      ${addr eno1}
${goto 100}${hr 2}
${goto 100}${time %Y-%m-%d %H:%M:%S}
]];
