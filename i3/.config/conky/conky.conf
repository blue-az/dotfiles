-- Wallpaper source: https://www.reddit.com/r/Fedora/comments/u7w7jp/as_promised_both_light_and_darkkind_of_versions/

conky.config = {
    alignment = 'top_right',
    background = true,
    double_buffer = true,

    -- Window settings (Wayland-compatible)
    own_window = true,
    own_window_class = 'Conky',
    own_window_type = 'desktop',
    own_window_transparent = false,
    own_window_argb_visual = true,
    own_window_argb_value = 200,
    own_window_colour = '1a1a1a',

    font = 'monospace:size=10',
    use_xft = true,

    update_interval = 2,

    gap_x = 20,
    gap_y = 40,

    -- Border
    border_width = 2,
    draw_borders = true,
    border_inner_margin = 10,
    border_outer_margin = 0,

    default_color = 'white',
    color1 = '50fa7b',  -- green
    color2 = '51a2da',  -- fedora blue
    default_outline_color = '50fa7b',
    default_shade_color = '50fa7b',
};

conky.text = [[
${color1}${font monospace:bold:size=12}SYSTEM${font}${color}
${hr 2}
${color1}DISK${color}    ${fs_free /} free
${color1}RAM${color}     ${mem} / ${memmax}
${color1}CPU${color}     ${cpu cpu0}%  ${execi 5 sensors | awk '/^Core 0:/ {gsub(/[^0-9.]/, "", $3); c=$3; printf "%.0f", c * 9/5 + 32}'}°F
${color1}CPU-W${color}   ${execi 5 E1=$(cat /sys/class/powercap/intel-rapl:0/energy_uj); sleep 0.5; E2=$(cat /sys/class/powercap/intel-rapl:0/energy_uj); echo $(( (E2 - E1) / 500000 ))}W
${color1}GPU${color}     ${execi 5 nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader,nounits}%  ${execi 5 C=$(nvidia-smi --query-gpu=temperature.gpu --format=csv,noheader,nounits); echo $(( C * 9 / 5 + 32 ))}°F
${color1}GPU-W${color}   ${execi 5 nvidia-smi --query-gpu=power.draw --format=csv,noheader,nounits | awk '{printf "%.0f", $1}'}W
${color1}IP${color}      ${addr eno1}
${hr 2}
${alignc}${time %Y-%m-%d %H:%M:%S}
${color1}OUTPUT${color}  ${execi 5 swaymsg -t get_outputs 2>/dev/null | jq -r '.[] | select(.focused) | .name' || xrandr --query | awk '/ connected primary/{print $1}'}
]];
